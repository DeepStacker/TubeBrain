version: "3.9"

services:
  # ── PostgreSQL (using Supabase cloud service) ──
  # Local PostgreSQL container removed - now using Supabase PostgreSQL
  # Set DATABASE_URL in backend/.env to your Supabase connection string:
  # DATABASE_URL=postgresql+asyncpg://user:password@host:port/database

  # ── Redis (using Upstash cloud service) ──
  # Local Redis container removed - now using Upstash Redis
  # Set REDIS_URL in backend/.env to your Upstash Redis URL:
  # REDIS_URL=rediss://default:<token>@<host>.upstash.io:6379

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - OAUTH_REDIRECT_BASE=http://localhost:8000
      # DATABASE_URL and REDIS_URL are loaded from ./backend/.env (cloud services)
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python3 -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Background Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    # DATABASE_URL and REDIS_URL are loaded from ./backend/.env (cloud services)
    volumes:
      - ./backend:/app
    command: >
      sh -c "python3 -m alembic upgrade head &&
             arq app.workers.tasks.WorkerSettings"

  # ── Vite Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
